<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="icon" sizes="16x16 32x32 48x48" type="image/png"
    href="https://res.cloudinary.com/dtno5yrwl/image/upload/v1777414614/Logo_ojcaft.svg" />

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" />

  <link rel="stylesheet" type="text/css"
    href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/regular/style.css" />

  <link rel="stylesheet" type="text/css"
    href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/fill/style.css" />

  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <link rel="stylesheet" href="/frontend/public/assets/styles/main.css" />

  <link rel="stylesheet" href="/frontend/views/components/styles/news.css" />

  <title>GameWired | Notícias</title>
</head>

<body>
  <div id="header"></div>

  <main id="news">
    <section class="container-top">
      <h1>Notícias</h1>

      <div class="newsCatgFilter">
        <button data-category="0" class="ativo">Todas</button>
        <button data-category="1">Jogos</button>
        <button data-category="2">Lançamentos</button>
        <button data-category="3">Eventos</button>
        <button data-category="4">Saúde</button>
        <button data-category="5">Educação</button>
        <button data-category="6">Política</button>
        <button data-category="7">Tecnologia</button>
        <button data-category="8">Indústria</button>
        <button data-category="9">eSports</button>
        <button data-category="10">Filmes/Séries</button>
      </div>

      <div class="filterInfo">
        <p>Filtro:</p>

        <div class="newsFilter">
          <select id="filter">
            <option value="data-new">Mais Recentes</option>
            <option value="data-old">Mais Antigas</option>
            <option value="a-z">Ordem Ascendente (A-Z)</option>
            <option value="z-a">Ordem Descrescente (Z-A)</option>
          </select>
        </div>
      </div>
    </section>

    <section class="container-cards" id="listaNoticias">
      <div id="newsContainer"></div>

      <div class="paginacao" id="paginacao"></div>
    </section>
  </main>

  <div id="footer"></div>

  <script src="/frontend/views/components/scripts/news.js"></script>
  <script src="/frontend/views/components/global/global-js/global-footer-header.js"></script>
  <script src="/frontend/public/assets/scripts/_temas.js"></script>
  <script src="/frontend/public/assets/scripts/_navBar.js"></script>
  <script src="/frontend/public/assets/scripts/_news-pages.js"></script>
</body>

</html>
