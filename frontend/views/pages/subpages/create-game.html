<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="icon" sizes="16x16 32x32 48x48" type="image/png"
        href="https://res.cloudinary.com/dtno5yrwl/image/upload/v1777414614/Logo_ojcaft.svg" />

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" />

    <link rel="stylesheet" type="text/css"
        href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/regular/style.css" />

    <link rel="stylesheet" type="text/css"
        href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/fill/style.css" />

    <link href="https://cdn.jsdelivr.net/npm/quill@2.0.3/dist/quill.snow.css" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script src="https://cdn.jsdelivr.net/npm/quill@2.0.3/dist/quill.js"></script>

    <link rel="stylesheet" href="/frontend/public/assets/styles/main.css" />

    <link rel="stylesheet" href="/frontend/views/components/styles/create-game.css" />

    <title>GameWired | Publicação de Jogos</title>
</head>
<body>
    <div id="header"></div>

    <div id="clear-modal" class="modal hidden">
        <div class="modal-content">
            <h4>Limpar conteúdo</h4>
            <p>Tem certeza que deseja limpar o conteúdo dessa notícia?</p>

            <div class="modal-actions">
                <button id="confirm-clear" class="btn-confirm">Limpar</button>
                <button id="cancel-clear" class="btn-cancel">Cancelar</button>
            </div>
        </div>
    </div>

    <main>
        <section class="container">
            <div class="card">

                <h3>Publicação de Jogo</h1>

                    <form method="post" id="form">
                        <div class="input-box">
                            <input type="text" id="game_name" placeholder="Digite o nome do jogo">
                            <span class="error"></span>
                        </div>

                        <div class="input-box">
                            <img id="preview-imagem" src="" alt="Imagem do Jogo">
                            <input type="file" id="game_img" accept="image/*">
                            <span class="error"></span>
                            <small>A imagem deve ter aproxidamente 600px de altura e 400px de largura.</small>
                            <small id="imagem-info" class="hidden">A imagem acima já está cadastrada. Escolha outra apenas se desejar substituí-la.</small>
                        </div>

                        <div class="input-box">
                            <div id="game_platforms" class="checkbox-platform">
                                <p>Escolha a(s) plataforma(s) do jogo:</p>

                                <input type="checkbox" id="pc" name="platforms" value="1">
                                <label for="pc">PC</label>

                                <input type="checkbox" id="console" name="platforms" value="2">
                                <label for="console">Console</label>

                                <input type="checkbox" id="mobile" name="platforms" value="3">
                                <label for="mobile">Mobile</label>
                            </div>

                            <span class="error"></span>
                        </div>

                        <div class="input-box">
                            <textarea name="description" class="description" placeholder="Digite uma descrição para o jogo" id="game_description"></textarea>
                            <span class="error"></span>
                        </div>

                        <div class="input-box">
                            <input type="text" id="game_genre" placeholder="Digite o(s) gênero(s) do jogo">
                            <span class="error"></span>
                        </div>

                        <div class="input-box">
                            <input type="text" id="game_developer" placeholder="Digite a(s) desenvolvedora(s) do jogo">
                            <span class="error"></span>
                        </div>

                        <div class="input-box">
                            <input type="text" id="game_publisher" placeholder="Digite a(s) publicadora(s) do jogo">
                            <span class="error"></span>
                        </div>

                        <div class="input-box">
                            <input type="text" id="game_classification"
                                placeholder="Digite a classificação indicativa do jogo">
                            <span class="error"></span>
                        </div>

                        <div class="input-box">
                            <input type="text" id="game_type" placeholder="Digite o tipo de jogo (pago ou gratuito)">
                            <span class="error"></span>
                        </div>

                        <div class="input-box">
                            <input type="text" id="game_download"
                                placeholder="Digite o link/local seguro para download">
                            <span class="error"></span>
                        </div>

                        <div class="input-box">
                            <textarea name="game_requirements" class="game_requirements" placeholder="Digite os requisitos do jogo" id="game_requirements" ></textarea>
                            <span class="error"></span>
                        </div>

                        <div class="action">
                            <button type="submit" class="btn-publish">Adicionar</button>
                            <button type="button" id="btn-clear" class="btn-publish">Limpar</button>
                        </div>
                    </form>
            </div>
    </main>

    <footer id="footer"></footer>

    <script src="/frontend/views/components/scripts/create-game.js"></script>
    <script src="/frontend/views/components/global/global-js/global-footer-header.js"></script>
    <script src="/frontend/public/assets/scripts/_temas.js"></script>
    <script src="/frontend/public/assets/scripts/_navBar.js"></script>
    <script src="/frontend/public/assets/scripts/_news-pages.js"></script>

</body>
</html>
