<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="icon" sizes="16x16 32x32 48x48" type="image/png"
    href="https://res.cloudinary.com/dtno5yrwl/image/upload/v1777414614/Logo_ojcaft.svg" />

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" />

  <link rel="stylesheet" type="text/css"
    href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/regular/style.css" />

  <link rel="stylesheet" type="text/css"
    href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/fill/style.css" />

  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <link rel="stylesheet" href="/frontend/public/assets/styles/main.css" />

  <link rel="stylesheet" href="/frontend/views/components/styles/profile.css" />

  <title>GameWired | Meu Perfil</title>
</head>
<body>
  <div id="header"></div>

  <div class="create-post">
    <div class="modal myModal">
      <div class="modal-content">
        <form id="form" method="post" class="postForm">
          <h3>Faça sua postagem na comunidade!</h3>
          <div class="titleCatg">
            <div class="input-box">
              <textarea name="title" class="title" placeholder="Digite o título do post..." id="titulo_postagem"></textarea>
              <span class="error"></span>
            </div>

            <div class="input-box">
              <select name="" class="postCategoria" id="categoria_postagem">
                <option value=""></option>
              </select>
              <span class="error"></span>
            </div>
          </div>

          <div class="input-box">
            <textarea name="subject" class="subject" placeholder="Digite o assunto do post..." id="conteudo_postagem"></textarea>
            <span class="error"></span>
          </div>

          <div class="input-box">
            <input type="file" class="imgPost" id="foto_postagem" accept="image/*">
            <span class="error"></span>
          </div>

          <div class="formButtons">
            <button type="submit" class="sentPost">Enviar</button>
            <button type="button" class="closeModal">Cancelar</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <main id="profile">
    <section class="container__profile">
      <aside>
        <form class="user">
          <img id="foto_perfil" class="foto-perfil"
            src="https://res.cloudinary.com/dtno5yrwl/image/upload/v1776181814/user-default_gcbfvc.jpg"
            alt="Foto de Perfil" />
          <input type="file" id="inputFoto" accept="image/*" style="display:none;">

          <h4 id="nome_usuario"></h4>

          <textarea id="bio" placeholder="Escreva sua bio e seus jogos favoritos..."></textarea>

          <div class="btns">
            <button type="button" id="btnSalvar" class="btn-salvar"><i class="bi bi-floppy2-fill"></i> Salvar</button>
            <button type="reset"><i class="bi bi-trash-fill"></i> Limpar</button>
          </div>
        </form>
      </aside>

      <section class="middle">
        <h1>Posts</h1>
        
        <div id="postsContainer"></div>

        <div id="loadingPosts" class="hidden">
          <div class="spinner"></div>
        </div>

        <div id="sentinelaPosts"></div>
      </section>
    </section>
  </main>

  <div id="footer"></div>

  <script src="/frontend/config/connection.js"></script>
  <script src="/frontend/views/components/scripts/profile.js" defer></script>
  <script src="/frontend/views/components/global/global-js/global-footer-header.js"></script>
  <script src="/frontend/public/assets/scripts/_auth.js"></script>
  <script src="/frontend/public/assets/scripts/_navBar.js"></script>
  <script src="/frontend/public/assets/scripts/_temas.js"></script>

</body>
</html>
