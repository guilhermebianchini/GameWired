<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="icon" sizes="16x16 32x32 48x48" type="image/png"
    href="https://res.cloudinary.com/dtno5yrwl/image/upload/v1777414614/Logo_ojcaft.svg" />

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" />

  <link rel="stylesheet" type="text/css"
    href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/regular/style.css" />

  <link rel="stylesheet" type="text/css"
    href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/fill/style.css" />

  <link href="https://cdn.jsdelivr.net/npm/quill@2.0.3/dist/quill.snow.css" rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <script src="https://cdn.jsdelivr.net/npm/quill@2.0.3/dist/quill.js"></script>

  <link rel="stylesheet" href="/frontend/public/assets/styles/main.css" />

  <link rel="stylesheet" href="/frontend/views/components/styles/create-news.css" />

  <title>GameWired | Publicação de Notícias</title>
</head>
<body>
  <div id="header"></div>

  <div id="clear-modal" class="modal hidden">
    <div class="modal-content">
      <h4>Limpar conteúdo</h4>
      <p>Tem certeza que deseja limpar o conteúdo dessa notícia?</p>

      <div class="modal-actions">
        <button id="confirm-clear" class="btn-confirm">Limpar</button>
        <button id="cancel-clear" class="btn-cancel">Cancelar</button>
      </div>
    </div>
  </div>

  <main>
    <section class="container">
      <div class="card">

        <h3>Publicação de Notícia</h1>

          <form method="post" id="form">
            <div class="input-box">
              <input type="text" id="titulo" placeholder="Digite o título da notícia">
              <span class="error"></span>
            </div>

            <!--<div class="input-box">
              <input type="date" id="data_publicacao">
              <span class="error"></span>
            </div>-->

            <div class="input-box">
              <div id="newsCatg" class="checkbox-news">
                <p>Escolha a(s) categoria(s) da notícia:</p>
                
                <div id="news_categories" class="catgGrid">
                  <div class="catgItem">
                    <label for="jogos">
                      <input type="checkbox" id="jogos" name="newsCategories" value="1">
                      Jogos
                    </label>
                  </div>

                  <div class="catgItem">
                    <label for="lancamentos">
                      <input type="checkbox" id="lancamentos" name="newsCategories" value="2">
                      Lançamentos
                    </label>
                  </div>

                  <div class="catgItem">
                    <label for="eventos">
                      <input type="checkbox" id="eventos" name="newsCategories" value="3">
                      Eventos
                    </label>
                  </div>

                  <div class="catgItem">
                    <label for="saude">
                      <input type="checkbox" id="saude" name="newsCategories" value="4">
                      Saúde
                    </label>
                  </div>

                  <div class="catgItem">
                    <label for="educacao">
                      <input type="checkbox" id="educacao" name="newsCategories" value="5">
                      Educação
                    </label>
                  </div>
                  
                  <div class="catgItem">
                    <label for="politica">
                      <input type="checkbox" id="politica" name="newsCategories" value="6">
                      Política
                    </label>
                  </div>

                  <div class="catgItem">
                    <label for="tecnologia">
                      <input type="checkbox" id="tecnologia" name="newsCategories" value="7">
                      Tecnologia
                    </label>
                  </div>

                  <div class="catgItem">
                    <label for="industria">
                      <input type="checkbox" id="industria" name="newsCategories" value="8">
                      Indústria
                    </label>
                  </div>

                  <div class="catgItem">
                    <label for="esports">
                      <input type="checkbox" id="esports" name="newsCategories" value="9">
                      eSports
                    </label>
                  </div>

                  <div class="catgItem">
                    <label for="filmes-series">
                      <input type="checkbox" id="filmes-series" name="newsCategories" value="10">
                      Filmes/Séries
                    </label>
                  </div>
                </div>
              </div>

              <span class="error"></span>
            </div>

            <div class="input-box">
              <input type="text" id="subtitulo" placeholder="Digite o subtítulo da notícia">
              <span class="error"></span>
            </div>

            <div class="input-box">
              <img id="preview-imagem" src="" alt="Imagem da notícia">
              <input type="file" id="img_noticia" accept="image/*">
              <small id="imagem-info" class="hidden">A imagem acima já está cadastrada. Escolha outra apenas se desejar
                substituí-la.</small>
              <span class="error"></span>
            </div>

            <div class="input-box">
              <div class="toolbar">
                <p>Barra de Ferramentas: </p>
                <button type="button" onclick="execCmd('bold')"><b>B</b></button>
                <button type="button" onclick="execCmd('italic')"><i>I</i></button>
                <button type="button" onclick="execCmd('underline')"><u>U</u></button>
                <button type="button" onclick="execCmd('video')">Vídeo</button>
              </div>

              <div id="conteudo" class="editor" contenteditable="true" data-placeholder="Digite o conteúdo da notícia">
              </div>
              <span class="error"></span>
            </div>

            <div class="input-box">
              <input type="text" id="fonte" placeholder="Digite a fonte da notícia">
              <span class="error"></span>
            </div>

            <div class="action">
              <button type="submit" class="btn-publish">Publicar</button>
              <button type="button" id="btn-clear" class="btn-publish">Limpar</button>
            </div>
          </form>
      </div>
  </main>

  <footer id="footer"></footer>

  <script src="/frontend/views/components/scripts/create-news.js"></script>
  <script src="/frontend/views/components/global/global-js/global-footer-header.js"></script>
  <script src="/frontend/public/assets/scripts/_temas.js"></script>
  <script src="/frontend/public/assets/scripts/_navBar.js"></script>
  <script src="/frontend/public/assets/scripts/_news-pages.js"></script>

</body>
</html>
